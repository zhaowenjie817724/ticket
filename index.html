<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="极速抢是一个面向顾客的官方购票入口助手，支持 12306 和大麦模式切换。"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <title>极速抢</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Official Ticket Assistant</p>
          <h1>极速抢</h1>
          <p class="brand-copy">提前准备目标入口，到点快速进入官方页面或手机 App，由本人完成确认和支付。</p>
        </div>
        <div class="mode-switch" role="tablist" aria-label="平台模式">
          <button class="mode-btn is-active" data-mode="rail" type="button">12306</button>
          <button class="mode-btn" data-mode="show" type="button">大麦</button>
        </div>
      </header>

      <main class="workspace">
        <section class="panel command-panel" aria-labelledby="mode-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Mode</p>
              <h2 id="mode-title">12306 官方入口配置</h2>
            </div>
            <span class="status-pill" id="risk-pill">官方入口</span>
          </div>

          <form id="planner-form" class="planner-form">
            <div class="form-grid" id="dynamic-fields"></div>
            <div class="form-actions">
              <button type="submit" class="primary-btn">生成冲刺入口</button>
              <button type="button" class="secondary-btn" id="save-btn">保存配置</button>
            </div>
          </form>
        </section>

        <section class="panel score-panel" aria-labelledby="score-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Readiness</p>
              <h2 id="score-title">准备度</h2>
            </div>
            <strong class="score-number" id="score-number">0</strong>
          </div>
          <div class="score-meter" aria-hidden="true">
            <span id="score-bar"></span>
          </div>
          <p class="score-copy" id="score-copy">填写目标后生成作战方案。</p>
        </section>

        <section class="panel sprint-panel" aria-labelledby="sprint-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Sprint</p>
              <h2 id="sprint-title">开抢入口</h2>
            </div>
            <span class="status-pill">性能专注</span>
          </div>
          <div class="sprint-body">
            <p class="sprint-status" id="sprint-status">冲刺模式未启动</p>
            <div class="sprint-options">
              <label><input type="checkbox" id="auto-jump" checked /> 到点自动跳转官方入口</label>
              <label><input type="checkbox" id="wake-lock-mode" checked /> 防息屏</label>
              <label><input type="checkbox" id="fullscreen-mode" checked /> 全屏专注</label>
            </div>
            <div class="sprint-actions">
              <button type="button" class="primary-btn" id="arm-sprint">启动冲刺模式</button>
              <button type="button" class="secondary-btn" id="jump-now">电脑网页入口</button>
              <button type="button" class="secondary-btn" id="jump-mobile">手机 App 入口</button>
              <button type="button" class="secondary-btn" id="copy-link">复制目标链接</button>
            </div>
            <div class="sprint-meta" id="sprint-meta"></div>
            <div class="network-grid" id="network-grid"></div>
          </div>
        </section>

        <section class="panel countdown-panel" aria-labelledby="countdown-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Timing</p>
              <h2 id="countdown-title">关键时间窗</h2>
            </div>
            <button type="button" class="icon-btn" id="refresh-time" aria-label="刷新倒计时">↻</button>
          </div>
          <div class="timeline" id="timeline"></div>
        </section>

        <section class="panel launcher-panel" aria-labelledby="launcher-title">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Official</p>
              <h2 id="launcher-title">官方入口</h2>
            </div>
          </div>
          <div class="launcher-grid" id="launcher-grid"></div>
          <div class="guard-box">
            <strong>人工确认闸门</strong>
            <p>
              本项目只做目标配置、倒计时、冲刺跳转和官方入口聚合；不做自动锁票、自动提交订单、
              验证码识别、接口逆向、代理池或多账号并发。
            </p>
          </div>
        </section>
      </main>
    </div>

    <template id="field-template">
      <label class="field">
        <span></span>
        <input />
      </label>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
